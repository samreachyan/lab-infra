services:
  # ============================================
  # Phase 1: PostgreSQL Database
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - platform
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Phase 2: Keycloak Identity Provider
  # ============================================
  keycloak:
    image: quay.io/keycloak/keycloak:26.6
    container_name: keycloak
    restart: unless-stopped
    command:
      - start
      - --import-realm
      - --proxy-headers=xforwarded
      - --hostname=keycloak.localhost
      - --hostname-strict=false
      - --http-enabled=true
      - --http-port=8080
      - --health-enabled=true
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak_password
      KC_HOSTNAME: keycloak.localhost
      KC_HOSTNAME_PORT: "80"
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin123
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
    networks:
      - platform
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      disable: true
    ports:
      - "8080:8080"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.keycloak.rule=Host(`keycloak.localhost`)"
      - "traefik.http.routers.keycloak.entrypoints=web"
      - "traefik.http.services.keycloak.loadbalancer.server.port=8080"

  # ============================================
  # Phase 3: Traefik Reverse Proxy
  # ============================================
  traefik:
    image: traefik:v3.1
    container_name: traefik
    restart: unless-stopped
    command:
      - --api.insecure=false
      - --api.dashboard=true
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --providers.file.filename=/etc/traefik/dynamic.yml
      - --providers.file.watch=true
      - --log.level=INFO
      - --accesslog=true
    ports:
      - "80:80"
      - "443:443"
      - "8082:8080"
    volumes:
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - ./traefik/certs:/etc/traefik/certs:ro
    networks:
      - platform
    healthcheck:
      test: ["CMD", "traefik", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ============================================
  # Phase 4: Portal UI (Nginx + SPA)
  # ============================================
  portal-ui:
    image: nginx:alpine
    container_name: portal-ui
    restart: unless-stopped
    volumes:
      - ./portal-ui/html:/usr/share/nginx/html:ro
      - ./portal-ui/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - platform
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portal.rule=Host(`portal.localhost`)"
      - "traefik.http.routers.portal.entrypoints=web"
      - "traefik.http.services.portal.loadbalancer.server.port=80"

  # ============================================
  # Phase 5: API Gateway (Spring Boot)
  # ============================================
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: gateway
    restart: unless-stopped
    environment:
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak.localhost/realms/sakcode-prod
      SERVER_PORT: "8080"
      TRANSFER_SERVICE_URL: http://transfer-service:8080
      PAYMENT_SERVICE_URL: http://payment-service:8080
      NOTIFICATION_SERVICE_URL: http://notification-service:8080
    networks:
      - platform
    extra_hosts:
      - "keycloak.localhost:host-gateway"
    depends_on:
      - keycloak
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api-gateway.rule=Host(`api.localhost`)"
      - "traefik.http.routers.api-gateway.entrypoints=web"
      - "traefik.http.services.api-gateway.loadbalancer.server.port=8080"

  # ============================================
  # Phase 6: Transfer Service
  # ============================================
  transfer-service:
    build:
      context: ./transfer-service
      dockerfile: Dockerfile
    container_name: transfer-service
    restart: unless-stopped
    environment:
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/sakcode-prod
      SERVER_PORT: "8080"
    networks:
      - platform
    depends_on:
      - keycloak

  # ============================================
  # Phase 6: Payment Service
  # ============================================
  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    container_name: payment-service
    restart: unless-stopped
    environment:
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/sakcode-prod
      SERVER_PORT: "8080"
    networks:
      - platform
    depends_on:
      - keycloak

  # ============================================
  # Phase 6: Notification Service
  # ============================================
  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    restart: unless-stopped
    environment:
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/sakcode-prod
      SERVER_PORT: "8080"
    networks:
      - platform
    depends_on:
      - keycloak

  # ============================================
  # Phase 7: Grafana with SSO
  # ============================================
  grafana:
    image: grafana/grafana-oss:12.0.1
    container_name: grafana
    restart: unless-stopped
    environment:
      GF_SERVER_ROOT_URL: http://grafana.localhost
      GF_SERVER_DOMAIN: grafana.localhost
      GF_AUTH_GENERIC_OAUTH_ENABLED: "true"
      GF_AUTH_GENERIC_OAUTH_NAME: Keycloak
      GF_AUTH_GENERIC_OAUTH_CLIENT_ID: grafana
      GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET: grafana-client-secret
      GF_AUTH_GENERIC_OAUTH_SCOPES: openid profile email
      GF_AUTH_GENERIC_OAUTH_AUTH_URL: http://keycloak.localhost/realms/sakcode-prod/protocol/openid-connect/auth
      GF_AUTH_GENERIC_OAUTH_TOKEN_URL: http://keycloak:8080/realms/sakcode-prod/protocol/openid-connect/token
      GF_AUTH_GENERIC_OAUTH_API_URL: http://keycloak.localhost/realms/sakcode-prod/protocol/openid-connect/userinfo
      GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH: "contains(realm_access.roles[*], 'grafana_admin') && 'Admin' || contains(realm_access.roles[*], 'DEVOPS') && 'Editor' || 'Viewer'"
      GF_AUTH_GENERIC_OAUTH_ALLOW_SIGN_UP: "true"
      GF_AUTH_GENERIC_OAUTH_AUTO_LOGIN: "false"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_AUTH_SIGNOUT_REDIRECT_URL: "http://keycloak.localhost/realms/sakcode-prod/protocol/openid-connect/logout?redirect_uri=http://grafana.localhost/login"
      GF_SERVER_ENFORCE_DOMAIN: "false"
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: grafana_admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    extra_hosts:
      - "keycloak.localhost:host-gateway"
    networks:
      - platform
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`grafana.localhost`)"
      - "traefik.http.routers.grafana.entrypoints=web"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"

  # ============================================
  # Phase 8: Prometheus
  # ============================================
  prometheus:
    image: prom/prometheus:v3.11.3
    container_name: prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
      - --web.external-url=http://prometheus.localhost
      - --web.route-prefix=/
    volumes:
      - prometheus_data:/prometheus
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - platform

  # ============================================
  # Phase 8: OAuth2-Proxy (SSO for Prometheus)
  # ============================================
  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
    container_name: oauth2-proxy
    restart: unless-stopped
    command:
      - --provider=keycloak-oidc
      - --client-id=prometheus-proxy
      - --client-secret=prometheus-proxy-secret
      - --redirect-url=http://prometheus.localhost/oauth2/callback
      - --oidc-issuer-url=http://keycloak:8080/realms/sakcode-prod
      - --insecure-oidc-skip-issuer-verification=true
      - --cookie-secret=abcdefghijklmnopqrstuvwxyz123456
      - --cookie-secure=false
      - --email-domain=*
      - --upstream=http://prometheus:9090
      - --http-address=0.0.0.0:4180
      - --reverse-proxy=true
      - --scope=openid profile email
    networks:
      - platform
    depends_on:
      - prometheus
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prometheus.rule=Host(`prometheus.localhost`)"
      - "traefik.http.routers.prometheus.entrypoints=web"
      - "traefik.http.services.prometheus.loadbalancer.server.port=4180"

  # ============================================
  # Phase 9: Uptime Kuma (Monitoring Dashboard)
  # ============================================
  uptime-kuma:
    image: louislam/uptime-kuma:2.4.0
    container_name: uptime-kuma
    restart: unless-stopped
    volumes:
      - uptime_kuma_data:/app/data
    networks:
      - platform
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:3001/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.uptime-kuma.rule=Host(`uptime-kuma.localhost`)"
      - "traefik.http.routers.uptime-kuma.entrypoints=web"
      - "traefik.http.services.uptime-kuma.loadbalancer.server.port=3001"

# ============================================
# Networks
# ============================================
networks:
  platform:
    driver: bridge
    name: platform

# ============================================
# Volumes
# ============================================
volumes:
  postgres_data:
  grafana_data:
  prometheus_data:
  uptime_kuma_data:
